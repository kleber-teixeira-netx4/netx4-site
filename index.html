<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetX4 Tech</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #eef2f7;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: 850px;
      overflow: hidden;
      line-height: 0;
    }

    .base-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .click-area {
      position: absolute;
      display: block;
      text-indent: -9999px;
      overflow: hidden;
      white-space: nowrap;
      border-radius: 14px;
    }

    .top-button {
      top: 1.85%;
      left: 69.2%;
      width: 27.6%;
      height: 4.45%;
    }

    .main-button {
      top: 60.95%;
      left: 10%;
      width: 52.9%;
      height: 4.1%;
      border-radius: 16px;
    }

    .email-link {
      position: absolute;
      left: 31.8%;
      bottom: 1.1%;
      width: 36.5%;
      height: 2.3%;
      text-indent: -9999px;
      overflow: hidden;
      white-space: nowrap;
      border-radius: 8px;
    }

    @media (max-width: 850px) {
      body {
        padding: 0;
      }

      .page {
        max-width: 100vw;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <img class="base-image" src="./imagem_site_netx4.jpeg" alt="NetX4 Tech" />

    <a class="click-area top-button" href="mailto:comercial@netx4.com.br?subject=Solicitar%20avalia%C3%A7%C3%A3o%20gratuita">Solicitar avaliação gratuita</a>

    <a class="click-area main-button" href="mailto:comercial@netx4.com.br?subject=Consultar%20elegibilidade%20para%20incentivo%20Microsoft">Consultar elegibilidade para incentivo Microsoft</a>

    <a class="email-link" href="mailto:comercial@netx4.com.br">comercial@netx4.com.br</a>
  </div>
</body>
</html>
