<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetX4 Tech</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #eef2f7;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      padding: 0;
    }

    .page {
      position: relative;
      width: 100%;
      max-width: 850px;
      aspect-ratio: 850 / 1536;
      background: url('./imagem_site_netx4.jpeg') center top / cover no-repeat;
      overflow: hidden;
    }

    .click-area {
      position: absolute;
      display: block;
      text-indent: -9999px;
      overflow: hidden;
      white-space: nowrap;
      border-radius: 14px;
    }

    .top-button {
      top: 1.9%;
      left: 69.2%;
      width: 27.8%;
      height: 4.5%;
    }

    .main-button {
      top: 60.9%;
      left: 9.7%;
      width: 53.5%;
      height: 4.3%;
      border-radius: 16px;
    }

    .email-link {
      position: absolute;
      left: 32%;
      bottom: 1.2%;
      width: 36%;
      height: 2.4%;
      text-indent: -9999px;
      overflow: hidden;
      white-space: nowrap;
      border-radius: 8px;
    }

    @media (max-width: 850px) {
      body {
        padding: 0;
        background: #eef2f7;
      }

      .page {
        max-width: 100vw;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <a class="click-area top-button" href="mailto:comercial@netx4.com.br?subject=Solicitar%20avalia%C3%A7%C3%A3o%20gratuita">Solicitar avaliação gratuita</a>

    <a class="click-area main-button" href="mailto:comercial@netx4.com.br?subject=Consultar%20elegibilidade%20para%20incentivo%20Microsoft">Consultar elegibilidade para incentivo Microsoft</a>

    <a class="email-link" href="mailto:comercial@netx4.com.br">comercial@netx4.com.br</a>
  </div>
</body>
</html>
